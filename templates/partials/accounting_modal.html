<!-- Record Transaction Modal -->
<div class="modal fade" id="recordTxnModal" tabindex="-1" aria-labelledby="recordTxnModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content" style="border-radius: 1rem;">
      <form method="post" action="{{ url_for('accounting_dashboard') }}">
        <input type="hidden" name="next_url" value="{{ request.path }}">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-semibold" id="recordTxnModalLabel">Record Payment / Expense</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">Transaction Type</label>
                <select class="form-select" name="txn_type" id="txnType">
                  <option value="income">Payment Received</option>
                  <option value="expense">Expense</option>
                </select>
              </div>
              <div class="mb-3" data-block="customer-fields">
                <label class="form-label">Customer</label>
                <select class="form-select" name="customer_id">
                  <option value="">Select customer</option>
                  {% for cust in customers %}
                    <option value="{{ cust.id }}">{{ cust.name }}{% if cust.company %} — {{ cust.company }}{% endif %}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-3" data-block="invoice-fields">
                <label class="form-label">Invoice (optional)</label>
                <select class="form-select" name="invoice_no">
                  <option value="">Select invoice</option>
                  {% for inv in invoice_choices %}
                    <option value="{{ inv }}">{{ inv }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" name="amount" step="0.01" min="0" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label">Mode</label>
                  <select class="form-select" name="mode">
                    {% for mode in payment_modes %}
                      <option value="{{ mode }}" {% if mode == 'bank' %}selected{% endif %}>{{ mode|capitalize }}</option>
                    {% endfor %}
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Account</label>
                  <select class="form-select" name="account">
                    {% for acct in account_options %}
                      <option value="{{ acct }}" {% if acct == 'current' %}selected{% endif %}>{{ acct|capitalize }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Remarks</label>
                <textarea class="form-control" rows="3" name="remarks" placeholder="Notes or references"></textarea>
              </div>
              <div id="expenseItemsWrapper" class="mb-3 d-none">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <label class="form-label mb-0">Expense Items</label>
                  <button type="button" class="btn btn-sm btn-outline-primary" id="addExpenseRow">Add Item</button>
                </div>
                <div id="expenseItemsRepeater"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary rounded-pill px-4">Save Transaction</button>
        </div>
      </form>
    </div>
  </div>
</div>

<template id="expenseRowTemplate">
  <div class="row g-2 align-items-end expense-item-row mb-2">
    <div class="col-7">
      <label class="form-label small text-muted">Description</label>
      <input type="text" class="form-control" name="expense_desc[]" placeholder="e.g., Paper stock">
    </div>
    <div class="col-4">
      <label class="form-label small text-muted">Amount</label>
      <input type="number" class="form-control" step="0.01" name="expense_amount[]" placeholder="0.00">
    </div>
    <div class="col-1 text-end">
      <button type="button" class="btn btn-outline-danger btn-sm remove-expense-row">&times;</button>
    </div>
  </div>
</template>
